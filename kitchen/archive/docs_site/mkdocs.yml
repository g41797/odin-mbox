site_name: matryoshka
site_description: Concurrency toolkit for Odin
site_url: https://g41797.github.io/matryoshka/
repo_url: https://github.com/g41797/matryoshka/
repo_name: matryoshka on GitHub

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.footer
    - navigation.instant
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - Concepts:
      - Mental Model: concepts/mental_model.md
      - Ownership: concepts/ownership.md
      - Message Passing: concepts/message_passing.md
  - Idioms:
      - Overview: idioms/index.md
      - Ownership and Lifecycle: idioms/ownership.md
      - Concurrency Structure: idioms/structure.md
  - Patterns:
      - Pipelines: patterns/pipelines.md
      - Event Loop: patterns/event_loop.md
      - Worker Pool: patterns/worker_pool.md
  - Components:
      - Mailbox: components/mailbox.md
      - MPSC: components/mpsc.md
      - Pool: components/pool.md
      - Loop: components/loop.md
      - Wakeuper: components/wakeuper.md
  - Guides:
      - Getting Started: guides/getting_started.md
      - Building a Pipeline: guides/building_pipeline.md
      - Event Loop: guides/event_loop.md
  - API:
      - Reference: api/index.md

plugins:
  - search

extra:
  generator: false

markdown_extensions:
  - attr_list
  - admonition

copyright: >
  Copyright &copy; 2026 g41797
