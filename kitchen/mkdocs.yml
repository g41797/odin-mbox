site_name: matryoshka
docs_dir: docs
site_dir: output
site_description: Building blocks for boring systems in Odin
repo_url: https://github.com/g41797/matryoshka/
repo_name: matryoshka on GitHub

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.footer
    - navigation.instant
    - toc.follow
    - content.code.copy

nav:
  - Home: problem2solve.md
# - Home: addendums/readme.md
  - Doll 1 — PolyNode + MayItem:
      - Quick Reference: block1_quickref.md
      - Deep Dive: block1_deepdive.md
  - Doll 2 — Mailbox:
      - Quick Reference: block2_quickref.md
      - Deep Dive: block2_deepdive.md
  - Doll 3 — Pool:
      - Quick Reference: block3_quickref.md
      - Deep Dive: block3_deepdive.md
  - Doll 4 — Infrastructure as Items:
      - Quick Reference: block4_quickref.md
      - Deep Dive: block4_deepdive.md
  - Addendums:
      - Forgotten Doll: addendums/forgotten_doll.md
  #     - Dialogs: addendums/dialogs.md
  #     - Advices: advices.md
  #     - Advice Catalog: advice_catalog.md
  #     - Hard Rules: addendums/hard-rules.md
  #     - Critical Issues: addendums/critical-issues.md
  #     - C++ Decision: addendums/cpp-decision.md
  #     - Doctor Ordered: addendums/doctor-ordered.md
  - API Reference: api_reference.md

plugins:
  - search

extra:
  generator: false

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

copyright: >
  Copyright &copy; 2026 g41797
